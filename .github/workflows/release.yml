name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS (universal)'
        type: boolean
        default: true
      build_android:
        description: 'Build Android (arm64 APK)'
        type: boolean
        default: true

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  # ───────────────────────────── Windows ─────────────────────────────
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    name: Build Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: binote
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: binote/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binote/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installers (NSIS + MSI)
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiNote-Windows
          path: |
            binote/src-tauri/target/release/bundle/nsis/*.exe
            binote/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ───────────────────────────── macOS ─────────────────────────────
  build-macos:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    name: Build macOS (universal)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: binote
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: binote/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install universal macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binote/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS .app and .dmg (universal)
        run: npm run mac:build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiNote-macOS
          path: |
            binote/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            binote/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ───────────────────────────── Android ─────────────────────────────
  build-android:
    if: ${{ github.event_name == 'push' || inputs.build_android }}
    name: Build Android (arm64 APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: binote
    env:
      NDK_VERSION: '26.1.10909125'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: binote/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binote/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/binote-release.keystore"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::notice::Using release keystore from secrets"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            ALIAS="${ANDROID_KEY_ALIAS}"
            STORE_PASS="${ANDROID_KEYSTORE_PASSWORD}"
            KEY_PASS="${ANDROID_KEY_PASSWORD}"
            echo "kind=release" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret found, generating ephemeral debug keystore"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias binote-ci \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=BiNote CI, OU=BiNote, O=BiNote, L=NA, ST=NA, C=NA"
            ALIAS="binote-ci"
            STORE_PASS="android"
            KEY_PASS="android"
            echo "kind=debug" >> "$GITHUB_OUTPUT"
          fi
          echo "path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Tauri Android init
        run: npx tauri android init

      - name: Sync custom Android icons
        shell: bash
        run: |
          set -e
          SRC=src-tauri/icons/android
          DST=src-tauri/gen/android/app/src/main/res
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26; do
            if [ -d "$SRC/$density" ]; then
              mkdir -p "$DST/$density"
              cp -rf "$SRC/$density"/* "$DST/$density/"
            fi
          done
          if [ -d "$SRC/values" ]; then
            mkdir -p "$DST/values"
            cp -rf "$SRC/values"/* "$DST/values/"
          fi

      - name: Build Android APK (Rust + Gradle)
        run: npx tauri android build --target aarch64 --apk true

      - name: Sign and align APK
        shell: bash
        run: |
          set -e
          UNSIGNED=$(find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" \
            \( -name "*unsigned*" -o -name "*release*" \) | head -n 1)
          if [ -z "$UNSIGNED" ]; then
            echo "::error::No APK produced by Tauri build"
            find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi
          echo "Found APK: $UNSIGNED"

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          echo "Using build-tools: $BUILD_TOOLS"

          ALIGNED="${RUNNER_TEMP}/BiNote-arm64-aligned.apk"
          SIGNED="${GITHUB_WORKSPACE}/binote/BiNote-arm64-release-signed.apk"

          "$BUILD_TOOLS/zipalign" -f -v -p 4 "$UNSIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "${{ steps.keystore.outputs.path }}" \
            --ks-key-alias "${{ steps.keystore.outputs.alias }}" \
            --ks-pass "pass:${{ steps.keystore.outputs.store_pass }}" \
            --key-pass "pass:${{ steps.keystore.outputs.key_pass }}" \
            --out "$SIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED"

          ls -lh "$SIGNED"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiNote-Android
          path: binote/BiNote-arm64-release-signed.apk
          if-no-files-found: error

  # ───────────────────────────── Release ─────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release
          # 桌面端安装器 + 移动端 APK，跳过 .app 目录（不便分发）
          find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.apk" \
          \) -exec cp {} release/ \;
          echo "Release assets:"
          ls -la release/

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "BiNote $TAG" \
            --generate-notes \
            --draft \
            release/*
