name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同分支后续 push 取消已在跑的检查
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: binote
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: binote/package-lock.json

      - run: npm ci

      - name: TypeScript + Vite build
        run: npm run build

  rust:
    name: Rust (fmt + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: binote/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            curl wget file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binote/src-tauri -> target

      - name: cargo check
        run: cargo check
