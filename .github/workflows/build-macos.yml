name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build universal macOS app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: binote

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: binote/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install universal macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app and DMG
        run: npm run mac:build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiNote-macOS
          path: |
            binote/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            binote/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
